name: "CI practise"

on:
  push:
    branches:
      - main  

jobs: 
  detect-changes:
   runs-on: ubuntu-latest
   outputs:
    frontend: ${{ steps.filter.outputs.frontend }}
    adservice: ${{ steps.filter.outputs.adservice }}
    cartservice: ${{ steps.filter.outputs.cartservice }}
    checkoutservice: ${{ steps.filter.outputs.checkoutservice }}
    productservice: ${{ steps.filter.outputs.productservice }}
    shippingservice: ${{ steps.filter.outputs.shippingservice }}
    paymentservice: ${{ steps.filter.outputs.paymentservice }}
    currencyservice: ${{ steps.filter.outputs.currencyservice }}
    emailservice: ${{ steps.filter.outputs.emailservice }}
    recommendationservice: ${{ steps.filter.outputs.recommendationservice }}
    shoppingassistantservice: ${{ steps.filter.outputs.shoppingassistantservice }}
    loadgenerator: ${{ steps.filter.outputs.loadgenerator }}

   steps:
    - uses: actions/checkout@v4

    - uses: dorny/paths-filter@v3
      id: filter
      with:
        filters: |
          frontend:
            - 'src/frontend/**'
          adservice:
            - 'src/adservice/**'
          cartservice:
            - 'src/cartservice/**'
          checkoutservice:
            - 'src/checkoutservice/**'
          productservice:
            - 'src/productcatalogservice/**'
          shippingservice:
            - 'src/shippingservice/**'
          paymentservice:
            - 'src/paymentservice/**'
          currencyservice:
            - 'src/currencyservice/**'
          emailservice:
            - 'src/emailservice/**'
          recommendationservice:
            - 'src/recommendationservice/**'
          shoppingassistantservice:
            - 'src/shoppingassistantservice/**'
          loadgenerator:
            - 'src/loadgenerator/**'
  set-version:
    runs-on: ubuntu-latest
    outputs:
     version: ${{ steps.v.outputs.version }}
    steps:
     - id: v
       run: echo "version=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT


  codeInteg:
    needs: [detect-changes, set-version]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
         include:
            - service_name: frontend
              filter: frontend
              context: ./src/frontend
              image: frontend
            - service_name: adservice
              filter: adservice
              context: ./src/adservice
              image: adservice
            - service_name: cartservice
              filter: cartservice
              context: ./src/cartservice/src/
              image: cartservice
            - service_name: checkoutservice
              filter: checkoutservice
              context: ./src/checkoutservice
              image: checkoutservice
            - service_name: productservice
              filter: productservice
              context: ./src/productcatalogservice
              image: productservice
            - service_name: shippingservice
              filter: shippingservice
              context: ./src/shippingservice
              image: shippingservice
            - service_name: paymentservice
              filter: paymentservice
              context: ./src/paymentservice
              image: paymentservice
            - service_name: currencyservice
              filter: currencyservice
              context: ./src/currencyservice
              image: currencyservice
            - service_name: emailservice
              filter: emailservice
              context: ./src/emailservice
              image: emailservice
            - service_name: recommendationservice
              filter: recommendationservice
              context: ./src/recommendationservice
              image: recommendationservice
            - service_name: shoppingassistantservice
              filter: shoppingassistantservice
              context: ./src/shoppingassistantservice
              image: shoppingassistantservice
            - service_name: loadgenerator
              filter: loadgenerator
              context: ./src/loadgenerator
              image: loadgenerator
    steps:
      - name: checkout
        uses: actions/checkout@v4
      
      - name: aws login
        uses : aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
     
      - name: aws ecr login
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

        
      - name: build and Push image
        if: needs.detect-changes.outputs[matrix.filter] == 'true'
        uses: docker/build-push-action@v4
        with: 
          context: ${{ matrix.context }}
          push: true
          tags: |
              ${{ steps.login-ecr.outputs.registry }}/${{ matrix.image }}:${{ needs.set-version.outputs.version }}
    outputs:
     registry: ${{ steps.login-ecr.outputs.registry }}
    
  deploy-infra:
    needs: [codeInteg, set-version]
    runs-on: ubuntu-latest
    concurrency:
         group: terraform
         cancel-in-progress: true
    steps:  
      - name: checkout
        uses: actions/checkout@v4

      - name: aws login
        uses : aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
     
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6
      - name: Terraform init
        run: |
            cd terraform
            terraform init --reconfigure
       
      - name: Terraform plan
        run: |
          cd terraform
          terraform plan -out=tfplan \
          -var="aws_region=us-east-1" \
          -var="frontend_image=${{ needs.codeInteg.outputs.registry }}/frontend:${{ needs.set-version.outputs.version }}" \
          -var="ad_image=${{ needs.codeInteg.outputs.registry }}/adservice:${{ needs.set-version.outputs.version }}" \
          -var="cart_image=${{ needs.codeInteg.outputs.registry }}/cartservice:${{ needs.set-version.outputs.version }}" \
          -var="checkout_image=${{ needs.codeInteg.outputs.registry }}/checkoutservice:${{ needs.set-version.outputs.version }}" \
          -var="product_image=${{ needs.codeInteg.outputs.registry }}/productservice:${{ needs.set-version.outputs.version }}" \
          -var="shipping_image=${{ needs.codeInteg.outputs.registry }}/shippingservice:${{ needs.set-version.outputs.version }}" \
          -var="payment_image=${{ needs.codeInteg.outputs.registry }}/paymentservice:${{ needs.set-version.outputs.version }}" \
          -var="currency_img=${{ needs.codeInteg.outputs.registry }}/currencyservice:${{ needs.set-version.outputs.version }}" \
          -var="email_Img=${{ needs.codeInteg.outputs.registry }}/emailservice:${{ needs.set-version.outputs.version }}" \
          -var="recomandation_image=${{ needs.codeInteg.outputs.registry }}/recommendationservice:${{ needs.set-version.outputs.version }}" \
          -var="assitant_image=${{ needs.codeInteg.outputs.registry }}/shoppingassistantservice:${{ needs.set-version.outputs.version }}" \
          -var="load_Img=${{ needs.codeInteg.outputs.registry }}/loadgenerator:${{ needs.set-version.outputs.version }}" 
       

      - name: Terraform apply
        if: success()
        run: |
          cd terraform
          terraform apply -auto-approve tfplan 
   